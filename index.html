<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>★琉光販賣所-日系編髮線上預約★</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root {
  --bg: #f6f1eb;
  --card: #fffaf4;
  --primary: #b48a63;
  --primary-dark: #9c7350;
  --text: #4a3b2c;
  --hint: #9a8f84;
}

.c-label {
  display: inline-block;
  width: 100px;
  text-align: right;
}


* {
  box-sizing: border-box;
  font-family: "Noto Sans TC","Microsoft JhengHei",sans-serif;
}

body {
  background: linear-gradient(180deg,#f6f1eb,#ede3d7);
  padding: 40px 16px;
  color: var(--text);
}

.container {
  max-width: 420px;
  margin: auto;
  background: var(--card);
  padding: 28px;
  border-radius: 22px;
  box-shadow: 0 30px 60px rgba(0,0,0,0.08);
}

/* 標題 */
h2 {
  text-align: center;
  margin-bottom: 24px;
  font-size: 22px;
  line-height: 1.4;
}
.subtitle {
  display:block;
  font-size:14px;
  color:#9a8f84;
  margin-top:4px;
  letter-spacing:2px;
}

/* 表單 */
.field {
  margin-bottom: 14px;
}

label {
  display:block;
  font-size:14px;
}

input, select {
  width:100%;
  margin-top:6px;
  font-size:15px;
  padding:12px;
  border-radius:12px;
  border:1px solid #ddd;
}

.hint {
  margin-top:6px;
  font-size:12px;
  color: var(--hint);
}

/* 按鈕 */
button {
  width:100%;
  margin-top: 26px;
  padding: 14px;
  background: linear-gradient(135deg,#b48a63,#caa684);
  border:none;
  border-radius:16px;
  font-size:16px;
  font-weight:bold;
  color:white;
  letter-spacing:1px;
  cursor:pointer;
  box-shadow:0 8px 18px rgba(180,138,99,0.35);
  transition: all 0.2s ease;
}
button:hover {
  transform: translateY(-2px);
  box-shadow:0 12px 22px rgba(180,138,99,0.45);
}

/* 匯款區 */
.bank-info {
  margin-top: 24px;
  padding: 16px;
  border-radius: 14px;
  background: linear-gradient(135deg,#f7efe8,#fdf8f2);
  border: 1px dashed #d8c9b8;
}
.bank-title {
  font-size: 14px;
  font-weight: bold;
  margin-bottom: 6px;
  color: #6b5a4a;
}
.bank-row {
  font-size: 14px;
  margin-bottom: 4px;
}
.bank-note {
  margin-top: 6px;
  font-size: 12px;
  color: var(--hint);
}

/* modal */
.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.45);
  display:none;
  align-items:center;
  justify-content:center;
}
.modal-box {
  background:white;
  padding:24px;
  border-radius:16px;
  max-width:340px;
  width:90%;
  text-align:center;
}

/* loading */
.loading {
  position:fixed;
  inset:0;
  background:rgba(246,241,235,0.75);
  display:none;
  align-items:center;
  justify-content:center;
}
.spinner {
  width:46px;
  height:46px;
  border:4px solid #ddd;
  border-top:4px solid var(--primary);
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

</style>
</head>

<body>

<div class="container">

  <h2>
    ✧ 琉光販賣所 ✧
    <span class="subtitle">日系編髮預約</span>
  </h2>

  <div class="field">
    <label>👤 姓名</label>
    <input id="name" placeholder="請輸入姓名">
    <div class="hint">請填寫全名以利核對</div>
  </div>

  <div class="field">
    <label>📞 電話</label>
    <input id="phone" placeholder="0912345678" maxlength="10">
    <div class="hint">請輸入 10 碼手機號碼</div>
  </div>

  <div class="field">
    <label>💰 匯款後5碼</label>
    <input id="paycode" placeholder="12345" maxlength="5">
    <div class="hint">請填寫轉帳完成後的帳號末 5 碼</div>
  </div>

  <div class="field">
    <label>📅 日期</label>
    <select id="dateSelect">
      <option value="">請選擇可預約日期</option>
    </select>
    <div class="hint">若日期未出現代表該日已額滿</div>
  </div>

  <div class="field">
    <label>⏰ 時間</label>
    <select id="timeSelect">
      <option value="">請先選擇日期</option>
    </select>
    <div class="hint">請先選擇日期後再選時間</div>
  </div>

  <div class="bank-info">
    <div class="bank-title">匯款資訊</div>
    <div class="bank-row">銀行：永豐銀行（807）</div>
    <div class="bank-row">帳號：14101800063837</div>
    <div class="bank-note">※ 完成匯款後，請填寫上方匯款後5碼</div>
    <div class="bank-note">匯款完成請私訊 kirariri studio 確認</div>
    <div class="bank-note">IG：kirariri_studio</div>
  </div>

  <button onclick="prepareConfirm()">送出預約</button>
</div>

<div class="modal" id="modal">
  <div class="modal-box" id="modalBox"></div>
</div>

<div class="loading" id="loading">
  <div class="spinner"></div>
</div>

<script>
const BACKEND = "https://hairbooking-backend.onrender.com";
const WEEKDAY = ["日","一","二","三","四","五","六"];

const dateSelect = document.getElementById("dateSelect");
const timeSelect = document.getElementById("timeSelect");
const modal = document.getElementById("modal");
const modalBox = document.getElementById("modalBox");
const loading = document.getElementById("loading");

const nameEl = document.getElementById("name");
const phoneEl = document.getElementById("phone");
const paycodeEl = document.getElementById("paycode");

function showLoading(){ loading.style.display="flex"; }
function hideLoading(){ loading.style.display="none"; }

function showModal(html){
  modalBox.innerHTML = html;
  modal.style.display = "flex";
}
function closeModal(){
  modal.style.display = "none";
}

function resetForm(){
  nameEl.value = "";
  phoneEl.value = "";
  paycodeEl.value = "";
  dateSelect.value = "";
  timeSelect.innerHTML = "<option value=''>請先選擇日期</option>";
}

function formatDateLabel(iso){
  const d = new Date(iso);
  const m = d.getMonth() + 1;
  const day = String(d.getDate()).padStart(2,"0");
  return `${m}月${day}日（${WEEKDAY[d.getDay()]}）`;
}

showLoading();
fetch(`${BACKEND}/available-dates`)
  .then(r => r.json())
  .then(list => {
    list.forEach(d => {
      const opt = document.createElement("option");
      opt.value = d.value;
      opt.textContent = formatDateLabel(d.value);
      dateSelect.appendChild(opt);
    });
  })
  .finally(() => hideLoading());

dateSelect.addEventListener("change", () => {
  timeSelect.innerHTML = "<option value=''>請先選擇日期</option>";
  if (!dateSelect.value) return;

  showLoading();
  fetch(`${BACKEND}/available-times?date=${dateSelect.value}`)
    .then(r => r.json())
    .then(times => {
      if (!times.length) {
        const opt = document.createElement("option");
        opt.textContent = "此日已額滿";
        opt.disabled = true;
        timeSelect.appendChild(opt);
        return;
      }
      times.forEach(t => {
        const opt = document.createElement("option");
        opt.value = t;
        opt.textContent = t;
        timeSelect.appendChild(opt);
      });
    })
    .finally(() => hideLoading());
});

function prepareConfirm(){
  const name = nameEl.value.trim();
  const phone = phoneEl.value.trim();
  const pay = paycodeEl.value.trim();

  if(!name || !phone || !pay || !dateSelect.value || !timeSelect.value)
    return showModal("<p>請完整填寫所有欄位</p><button onclick='closeModal()'>確定</button>");

  if(!/^\d{10}$/.test(phone))
    return showModal("<p>電話需為10碼數字</p><button onclick='closeModal()'>確定</button>");

  if(!/^\d{5}$/.test(pay))
    return showModal("<p>匯款後5碼需為5位數</p><button onclick='closeModal()'>確定</button>");

  showModal(`
    <p style="font-weight:bold">請確認預約資訊</p>
    <div style="text-align:left; display:inline-block;">
      <p><span class="c-label">姓名</span>：${name}</p>
      <p><span class="c-label">電話</span>：${phone}</p>
      <p><span class="c-label">匯款後5碼</span>：${pay}</p>
      <p><span class="c-label">日期</span>：${dateSelect.options[dateSelect.selectedIndex].text}</p>
      <p><span class="c-label">時間</span>：${timeSelect.value}</p>
    </div>

    <button onclick="submit()">確認送出</button>
    <button onclick="closeModal()">取消</button>
  `);
}

function submit(){
  showLoading();
  fetch(`${BACKEND}/reserve`,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      name:nameEl.value,
      phone:phoneEl.value,
      paycode:paycodeEl.value,
      date:dateSelect.value,
      time:timeSelect.value
    })
  })
  .then(r=>r.json())
  .then(()=>{
    showModal(`
      <p>✅ 預約成功</p>
    
      <p style="font-size:12px; color: var(--hint); margin-top:8px;">
        請私訊 kirariri studio 確認<br>
        IG：kirariri_studio
      </p>
    
      <button onclick='closeModal(); resetForm();'>確定</button>
    `);
  })
  .finally(()=>hideLoading());
}
</script>

</body>
</html>
